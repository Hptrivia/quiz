<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile | Trivia Gauntlet</title>
  <meta name="robots" content="noindex" />
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-E6BY9F2ZDT"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-E6BY9F2ZDT');
  </script>
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/assets/icon-192.png" />
  <meta name="theme-color" content="#0f172a" />
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <main class="container narrow" style="padding-top:12px;">
    <div class="theme-top-links">
      <a href="index.html" class="back-link" onclick="if(history.length>1){history.back();return false;}">&#8592; Back</a>
    </div>

    <section class="panel">

      <!-- Avatar + name -->
      <div style="text-align:center;margin-bottom:20px;">
        <div id="profileAvatarLarge" style="margin:0 auto 10px;cursor:pointer;" title="Change colour" onclick="document.getElementById('colorPickerSection').style.display=document.getElementById('colorPickerSection').style.display==='none'?'block':'none'"></div>
        <div id="profileNameDisplay" class="profile-name"></div>
        <div id="profileSince" class="profile-since"></div>
      </div>

      <!-- Edit name -->
      <div style="margin-bottom:16px;">
        <label class="form-label" for="profileNameInput">Display name</label>
        <div style="display:flex;gap:8px;">
          <input id="profileNameInput" class="form-input" type="text" maxlength="30" placeholder="Enter your name" style="flex:1;" />
          <button class="secondary-btn" onclick="saveName()" style="white-space:nowrap;">Save</button>
        </div>
      </div>

      <!-- Color picker -->
      <div id="colorPickerSection" style="display:none;margin-bottom:16px;">
        <div class="form-label">Avatar colour</div>
        <div id="colorSwatches" class="profile-color-picker"></div>
      </div>

      <!-- Warning -->
      <div class="profile-warning">
        &#9888; Stats are saved on this device only. Clearing your browser cache will erase them. Export regularly to keep a backup.
      </div>

      <!-- Email -->
      <div style="margin-bottom:20px;">
        <label class="form-label" for="profileEmail">Email (for future recovery)</label>
        <div style="display:flex;gap:8px;">
          <input id="profileEmail" class="form-input" type="email" placeholder="your@email.com" style="flex:1;" />
          <button class="secondary-btn" id="emailSaveBtn" onclick="saveEmail()" style="white-space:nowrap;">Save</button>
        </div>
        <p style="font-size:0.78rem;color:var(--muted-text);margin-top:5px;">We&#39;ll use this to help you recover your stats when cloud save launches.</p>
      </div>

      <!-- Export / Import -->
      <div style="display:flex;gap:10px;margin-bottom:24px;">
        <button class="secondary-btn" style="flex:1;" onclick="doExport()">&#8595; Export Stats</button>
        <label class="secondary-btn" style="flex:1;text-align:center;cursor:pointer;">
          &#8593; Import Stats
          <input type="file" accept=".json" style="display:none;" onchange="doImport(this)" />
        </label>
      </div>

      <!-- Tabs -->
      <div class="profile-tabs">
        <button class="profile-tab active" onclick="switchTab('overall', this)">Overall</button>
        <button class="profile-tab" onclick="switchTab('themes', this)">My Themes</button>
        <button class="profile-tab" onclick="switchTab('mashups', this)">Saved Mashups</button>
      </div>

      <!-- Overall tab -->
      <div id="tab-overall">
        <div class="stat-grid" id="overallStatGrid"></div>
        <div id="overallModeStats"></div>
      </div>

      <!-- My Themes tab -->
      <div id="tab-themes" style="display:none;">
        <div id="themeStatsList"></div>
      </div>

      <!-- Saved Mashups tab -->
      <div id="tab-mashups" style="display:none;">
        <div id="savedMashupsList"></div>
      </div>

    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-links">
        <a href="remove-ads.html" class="footer-highlight">Buy me a coffee</a>
        <a href="about.html">About</a>
        <a href="how-it-works.html">How It Works</a>
        <a href="contact.html">Contact</a>
        <a class="footer-highlight" href="blog.html">Blog</a>
        <a href="privacy.html">Privacy Policy</a>
        <a href="terms.html">Terms</a>
      </div>
    </div>
  </footer>

  <script src="assets/profile.js"></script>
  <script>
    const FORMSPREE = "https://formspree.io/f/mpqybwea";

    function renderPage() {
      const p = getProfile();

      // Avatar large
      document.getElementById("profileAvatarLarge").innerHTML = getAvatarHtml(72);
      document.getElementById("profileNameDisplay").textContent = p.name || "Anonymous Player";
      document.getElementById("profileSince").textContent = p.createdAt ? `Playing since ${p.createdAt}` : "";

      // Pre-fill inputs
      document.getElementById("profileNameInput").value = p.name || "";
      document.getElementById("profileEmail").value = p.email || "";

      // Color swatches
      const sw = document.getElementById("colorSwatches");
      sw.innerHTML = AVATAR_COLORS.map(c =>
        `<div class="color-swatch${c === p.avatarColor ? ' active' : ''}" style="background:${c};" onclick="pickColor('${c}')"></div>`
      ).join("");

      renderOverall(p);
      renderThemes(p);
      renderMashups(p);
    }

    function renderOverall(p) {
      const s = p.stats;
      const totalAnswered = (s.marathon.totalAnswered || 0) + (s.challenge.totalAnswered || 0);
      const totalCorrect  = (s.marathon.totalCorrect  || 0) + (s.challenge.totalCorrect  || 0);
      const accuracy = totalAnswered > 0 ? Math.round((totalCorrect / totalAnswered) * 100) : 0;

      document.getElementById("overallStatGrid").innerHTML = `
        <div class="stat-card"><div class="stat-card-val">${totalAnswered.toLocaleString()}</div><div class="stat-card-label">Questions Answered</div></div>
        <div class="stat-card"><div class="stat-card-val">${accuracy}%</div><div class="stat-card-label">Overall Accuracy</div></div>
        <div class="stat-card"><div class="stat-card-val">${s.marathon.roundsCompleted}</div><div class="stat-card-label">Marathon Rounds</div></div>
        <div class="stat-card"><div class="stat-card-val">${s.challenge.roundsCompleted}</div><div class="stat-card-label">Challenge Rounds</div></div>
        <div class="stat-card"><div class="stat-card-val">${s.survival.longestRun}</div><div class="stat-card-label">Survival Best</div></div>
        <div class="stat-card"><div class="stat-card-val">${s.triviaRush.highestScore.toLocaleString()}</div><div class="stat-card-label">Trivia Rush Best</div></div>
      `;

      let html = "";

      if (s.marathon.roundsCompleted > 0) {
        html += `<div class="profile-section-title">Marathon</div>
        <div class="theme-stat-card">
          <div class="theme-stat-row"><span>Best score</span><span>${s.marathon.bestScore}/30${s.marathon.bestScoreTheme ? ` (${s.marathon.bestScoreTheme})` : ""}</span></div>
          <div class="theme-stat-row"><span>Rounds completed</span><span>${s.marathon.roundsCompleted}</span></div>
          <div class="theme-stat-row"><span>Total correct</span><span>${s.marathon.totalCorrect} / ${s.marathon.totalAnswered}</span></div>
        </div>`;
      }
      if (s.challenge.roundsCompleted > 0) {
        html += `<div class="profile-section-title">Challenge</div>
        <div class="theme-stat-card">
          <div class="theme-stat-row"><span>Best score</span><span>${s.challenge.bestScore}/10${s.challenge.bestScoreTheme ? ` (${s.challenge.bestScoreTheme})` : ""}</span></div>
          <div class="theme-stat-row"><span>Rounds completed</span><span>${s.challenge.roundsCompleted}</span></div>
        </div>`;
      }
      if (s.survival.totalRuns > 0) {
        html += `<div class="profile-section-title">Survival</div>
        <div class="theme-stat-card">
          <div class="theme-stat-row"><span>Longest run</span><span>${s.survival.longestRun} Qs${s.survival.longestRunTheme ? ` (${s.survival.longestRunTheme})` : ""}</span></div>
          <div class="theme-stat-row"><span>Total runs</span><span>${s.survival.totalRuns}</span></div>
        </div>`;
      }
      if (s.triviaRush.totalRuns > 0) {
        html += `<div class="profile-section-title">Trivia Rush</div>
        <div class="theme-stat-card">
          <div class="theme-stat-row"><span>Highest score</span><span>${s.triviaRush.highestScore.toLocaleString()}${s.triviaRush.highestScoreTheme ? ` (${s.triviaRush.highestScoreTheme})` : ""}</span></div>
          <div class="theme-stat-row"><span>Longest streak</span><span>${s.triviaRush.longestStreak}</span></div>
          <div class="theme-stat-row"><span>Total runs</span><span>${s.triviaRush.totalRuns}</span></div>
        </div>`;
      }
      if (s.wordle.totalAttempted > 0) {
        const wPct = Math.round((s.wordle.totalSolved / s.wordle.totalAttempted) * 100);
        html += `<div class="profile-section-title">Wordle</div>
        <div class="theme-stat-card">
          <div class="theme-stat-row"><span>Words solved</span><span>${s.wordle.totalSolved} / ${s.wordle.totalAttempted} (${wPct}%)</span></div>
        </div>`;
      }
      if (s.wordSearch.totalCompleted > 0) {
        html += `<div class="profile-section-title">Word Search</div>
        <div class="theme-stat-card">
          <div class="theme-stat-row"><span>Puzzles completed</span><span>${s.wordSearch.totalCompleted}</span></div>
        </div>`;
      }

      if (!html) html = `<p class="profile-empty">No stats yet. Start playing to build your history.</p>`;
      document.getElementById("overallModeStats").innerHTML = html;
    }

    function renderThemes(p) {
      const s = p.stats;
      const themeMap = {};

      const add = (slug, mode, data) => {
        if (!themeMap[slug]) themeMap[slug] = { slug, modes: {} };
        themeMap[slug].modes[mode] = data;
      };

      for (const [slug, d] of Object.entries(s.marathon.themes))   add(slug, "Marathon",    d);
      for (const [slug, d] of Object.entries(s.challenge.themes))   add(slug, "Challenge",   d);
      for (const [slug, d] of Object.entries(s.survival.themes))    add(slug, "Survival",    d);
      for (const [slug, d] of Object.entries(s.triviaRush.themes))  add(slug, "Trivia Rush", d);
      for (const [slug, d] of Object.entries(s.wordle.themes))      add(slug, "Wordle",      d);
      for (const [slug, d] of Object.entries(s.wordSearch.themes))  add(slug, "Word Search", d);

      const themes = Object.values(themeMap);
      if (!themes.length) {
        document.getElementById("themeStatsList").innerHTML = `<p class="profile-empty">No themes played yet. Each theme you play will appear here.</p>`;
        return;
      }

      document.getElementById("themeStatsList").innerHTML = themes.map(({ slug, modes }) => {
        const title = slug.split("-").map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(" ");
        const rows = Object.entries(modes).map(([mode, d]) => {
          let val = "";
          if (mode === "Marathon")    val = `Best ${d.bestScore || 0}/30 · ${d.rounds || 0} rounds`;
          if (mode === "Challenge")   val = `Best ${d.bestScore || 0}/10 · ${d.rounds || 0} rounds`;
          if (mode === "Survival")    val = `Best ${d.longestRun || 0} Qs · ${d.runs || 0} runs`;
          if (mode === "Trivia Rush") val = `Best ${(d.highestScore || 0).toLocaleString()} · ${d.runs || 0} runs`;
          if (mode === "Wordle")      val = `${d.solved || 0}/${d.attempted || 0} solved`;
          if (mode === "Word Search") val = `${d.completed || 0} completed`;
          return `<div class="theme-stat-row"><span>${mode}</span><span>${val}</span></div>`;
        }).join("");
        return `<div class="theme-stat-card">
          <h3><a href="themes/${slug}.html" style="color:inherit;text-decoration:none;">${title}</a></h3>
          ${rows}
        </div>`;
      }).join("");
    }

    function renderMashups(p) {
      const list = p.savedMashups || [];
      if (!list.length) {
        document.getElementById("savedMashupsList").innerHTML = `<p class="profile-empty">No saved mashups yet. Save a custom theme mix from the Mashup page.</p>`;
        return;
      }
      document.getElementById("savedMashupsList").innerHTML = list.map((m, i) => `
        <div class="theme-stat-card" style="display:flex;justify-content:space-between;align-items:center;">
          <div>
            <div style="font-weight:600;margin-bottom:4px;">${m.name || "My Mix"}</div>
            <div style="font-size:0.78rem;color:var(--muted-text);">${(m.themes || []).join(", ")}</div>
          </div>
          <div style="display:flex;gap:8px;">
            <a href="mashup.html?preset=${(m.themes || []).join(',')}" class="secondary-btn" style="font-size:0.8rem;padding:6px 12px;text-decoration:none;">Play</a>
            <button class="secondary-btn" style="font-size:0.8rem;padding:6px 12px;" onclick="deleteMashup(${i})">&#10005;</button>
          </div>
        </div>
      `).join("");
    }

    function switchTab(name, btn) {
      document.querySelectorAll(".profile-tab").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      ["overall","themes","mashups"].forEach(t => {
        document.getElementById(`tab-${t}`).style.display = t === name ? "" : "none";
      });
      if (typeof gtag === "function") gtag("event", "profile_tab_view", { tab: name });
    }

    function pickColor(color) {
      const p = getProfile();
      p.avatarColor = color;
      saveProfile(p);
      renderPage();
      document.getElementById("colorPickerSection").style.display = "block";
    }

    function saveName() {
      const name = document.getElementById("profileNameInput").value.trim();
      const p = getProfile();
      p.name = name;
      if (!p.createdAt) p.createdAt = new Date().toISOString().split("T")[0];
      saveProfile(p);
      renderPage();
      if (name && typeof gtag === "function") gtag("event", "profile_name_saved");
    }

    async function saveEmail() {
      const email = document.getElementById("profileEmail").value.trim();
      if (!email) return;
      const p = getProfile();
      p.email = email;
      saveProfile(p);

      const btn = document.getElementById("emailSaveBtn");
      btn.textContent = "Saving...";
      btn.disabled = true;
      try {
        await fetch(FORMSPREE, {
          method: "POST",
          headers: { "Content-Type": "application/json", "Accept": "application/json" },
          body: JSON.stringify({ type: "profile-registration", email, name: p.name || "", _subject: "Trivia Gauntlet Profile Email" })
        });
        btn.textContent = "Saved ✓";
        if (typeof gtag === "function") gtag("event", "profile_email_submitted");
      } catch {
        btn.textContent = "Saved locally";
      }
      setTimeout(() => { btn.textContent = "Save"; btn.disabled = false; }, 2500);
    }

    function doExport() {
      exportProfile();
      if (typeof gtag === "function") gtag("event", "profile_exported");
    }

    async function doImport(input) {
      const file = input.files[0];
      if (!file) return;
      try {
        await importProfile(file);
        renderPage();
        alert("Stats imported successfully.");
      } catch { alert("Could not import that file. Make sure it's a Trivia Gauntlet export."); }
      input.value = "";
    }

    function deleteMashup(i) {
      const p = getProfile();
      p.savedMashups.splice(i, 1);
      saveProfile(p);
      renderMashups(p);
    }

    renderPage();
  </script>
</body>
</html>
