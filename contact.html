<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact - TriviaGauntlet</title>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2544021252380572"
     crossorigin="anonymous"></script>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-E6BY9F2ZDT"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-E6BY9F2ZDT');
</script>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
<main class="container narrow">
  <a href="index.html" class="back-link" onclick="if (history.length > 1) { history.back(); return false; }">← Back</a>

  <section class="panel">
    <h1>Contact / Feedback</h1>
    <p>
      Found a wrong question, want to request a pack not currently in the shop, spotted a bug, or just want to share feedback? Send it here.
    </p>

    <p class="contact-alt">
      Or email directly:
      <a class="upload-link" href="mailto:triviaking2025@gmail.com?subject=Trivia%20Gauntlet%20Feedback">triviaking2025@gmail.com</a>
    </p>

    <form class="contact-form" action="https://formspree.io/f/mpqybwea" method="POST">
      <label class="form-label" for="feedbackType">Type</label>
      <select id="feedbackType" name="type" class="form-input">
        <option value="general">General Feedback</option>
        <option value="pack">Request a Theme Pack</option>
        <option value="question">Wrong Question / Answer</option>
        <option value="bug">Bug / Technical Issue</option>
        <option value="suggestion">Suggestion</option>
      </select>

      <label class="form-label" for="message">Message</label>
      <textarea
        id="message"
        name="message"
        class="form-input form-textarea"
        placeholder="Type your feedback here..."
        required
      ></textarea>

      <label class="form-label" for="email">Email (optional)</label>
      <input
        id="email"
        name="email"
        type="email"
        class="form-input"
        placeholder="you@example.com"
      />

      <button type="submit" class="primary-btn">Send Feedback</button>
    </form>
  </section>
</main>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-links">
        <a id="removeAdsLink" class="footer-highlight" href="remove-ads.html">Ad-Free + Extras</a>
        <a href="about.html">About</a>
        <a class="footer-highlight" href="how-it-works.html">How It Works</a>
        <a class="footer-highlight" href="contact.html">Contact</a>
        <a class="footer-highlight" href="blog.html">Blog</a>
        <a href="privacy.html">Privacy Policy</a>
        <a href="terms.html">Terms</a>
      </div>
    </div>
  </footer>
    <script src="assets/app.js"></script>
  <script src="assets/remove-ads.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    const params = new URLSearchParams(window.location.search);
    const topic = params.get("topic");
    const subjectSelect = document.getElementById("feedbackType");

    if (topic && subjectSelect) {
      subjectSelect.value = topic;
    }
  });
</script>
</body>
</html>
