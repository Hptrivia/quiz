name: Morning Pinterest Pin

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Chrome dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 \
            libxkbcommon0 libxcomposite1 libgbm-dev libnss3 libxss1 \
            libasound2t64 libxfixes3 libxrandr2

      - name: Install dependencies
        run: npm install puppeteer

      - name: Run morning pin
        run: node scripts/run-morning.js
        env:
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PINTEREST_BOARD_TV_SERIES: ${{ secrets.PINTEREST_BOARD_TV_SERIES }}
          PINTEREST_BOARD_GAMES: ${{ secrets.PINTEREST_BOARD_GAMES }}
          PINTEREST_BOARD_SPORTS: ${{ secrets.PINTEREST_BOARD_SPORTS }}
          PINTEREST_BOARD_GENERAL: ${{ secrets.PINTEREST_BOARD_GENERAL }}
