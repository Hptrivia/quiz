<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

<body data-page="play">
  <main class="container narrow">
    <a href="index.html" class="back-link">← Back to Home</a>

    <section class="panel">
      <h1 id="playTitle">Loading...</h1>

      <div id="quizBox">
        <p id="progressText"></p>
        <h2 id="questionText"></h2>
        <div id="optionsList" class="options"></div>
        <p id="scoreText">Score: 0</p>
        <p id="feedbackText" class="feedback"></p>

        <div class="cta-row">
          <button id="submitButton" class="primary-btn">Submit</button>
          <button id="nextButton" class="secondary-btn" style="display:none;">Next</button>
        </div>
      </div>

      <div id="resultBox" style="display:none;"></div>
    </section>
  </main>

  <footer class="site-footer">
