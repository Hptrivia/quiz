<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Play Quiz</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body data-page="play">
  <main class="container narrow">
    <a href="index.html" class="back-link">← Back to Home</a>

    <section class="panel">
      <h1 id="playTitle">Loading...</h1>

      <div id="quizBox">
        <p id="progressText"></p>
        <p id="scoreText">Score: 0</p>
        <h2 id="questionText"></h2>
        <div id="optionsList" class="options"></div>
        <p id="feedbackText" class="feedback"></p>

        <div class="cta-row">
          <button id="submitButton" class="primary-btn">Submit</button>
          <button id="nextButton" class="secondary-btn" style="display:none;">Next</button>
        </div>
      </div>

      <div id="resultBox" style="display:none;"></div>
    </section>
  </main>

  <script src="assets/app.js"></script>
</body>
</html>
