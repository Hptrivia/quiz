<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Trivia Gauntlet</title>

  <!-- AdSense script -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2544021252380572"
     crossorigin="anonymous"></script>

  <style>
    :root {
      --ad-h: 72px;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    body {
      padding-bottom: calc(var(--ad-h) + env(safe-area-inset-bottom));
      box-sizing: border-box;
    }

    .app-frame {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
    }

    .adbar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: calc(var(--ad-h) + env(safe-area-inset-bottom));
      padding-bottom: env(safe-area-inset-bottom);
      background: #111;
      z-index: 9999;

      display: flex;
      align-items: center;
      justify-content: center;

      box-shadow: 0 -2px 8px rgba(0,0,0,0.25);
    }

    @media (max-width: 420px) {
      :root {
        --ad-h: 60px;
      }
    }
  </style>
</head>
<body>

  <iframe
    class="app-frame"
    src="https://trivia-5pja.onrender.com/"
    title="Trivia Gauntlet"
    loading="eager"
    referrerpolicy="no-referrer-when-downgrade"
    allow="fullscreen"
  ></iframe>

  <div class="adbar">
    <div style="color:#aaa;font:14px Arial;">Sticky ad goes here</div>
  </div>

</body>
</html>
