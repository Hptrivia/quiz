<script>
/* Recently Added — reads the generated feed (scripts/generate-recent.js).
   If the feed is missing or stale-broken we fall back to the tail of
   themes.json, which is append-ordered, so the page never renders empty. */
(function () {
  const listEl = document.getElementById("recentList");

  function esc(s) {
    return String(s).replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
  }

  // "2026-07-17" -> "17 July 2026". Parsed as UTC so the day never shifts.
  function prettyDate(iso) {
    const [y, m, d] = String(iso).split("-").map(Number);
    if (!y || !m || !d) return "";
    return new Date(Date.UTC(y, m - 1, d))
      .toLocaleDateString("en-GB", { day: "numeric", month: "long", year: "numeric", timeZone: "UTC" });
  }

  function render(entries) {
    if (!entries.length) {
      listEl.innerHTML = `<p class="recent-empty">Nothing here yet — check back soon.</p>`;
      return;
    }

    let html = "";
    let currentDate = null;

    entries.forEach(e => {
      if (e.date && e.date !== currentDate) {
        currentDate = e.date;
        html += `<h3 class="recent-date">Added ${esc(prettyDate(e.date))}</h3>`;
      }
      const isEpisode = e.type === "episode";
      html += `
        <a class="recent-row${isEpisode ? " is-episode" : ""}" href="${esc(e.url)}"
           data-promo="recent_item" data-promo-theme="${esc(e.slug)}">
          <span class="recent-row-title">${esc(e.title)}</span>
          <span class="recent-row-label">${esc(e.label)}</span>
        </a>`;
    });

    listEl.innerHTML = html;
  }

  fetch("data/recent.json")
    .then(r => { if (!r.ok) throw new Error("no feed"); return r.json(); })
    .then(data => render(Array.isArray(data) ? data : []))
    .catch(() =>
      fetch("data/themes.json")
        .then(r => r.json())
        .then(themes =>
          render(
            themes.slice(-20).reverse().map(t => ({
              type: "theme",
              slug: t.slug,
              title: t.title,
              label: t.category,
              date: "",
              url: `challenge.html?theme=${t.slug}&round=1`
            }))
          )
        )
        .catch(() => render([]))
    );
})();
</script>
