<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Get Trivia Gauntlet</title>
  <link rel="apple-touch-icon" href="/assets/icon-192.png" />
  <style>
    html, body { margin: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #15151f; color: #fff; }
    .wrap { min-height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 24px; box-sizing: border-box; gap: 18px; }
    img.logo { width: 88px; height: 88px; border-radius: 20px; }
    h1 { margin: 0; font-size: 1.4em; }
    p { margin: 0; opacity: .85; }
    .btns { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 280px; }
    a.store { display: block; padding: 14px 20px; border-radius: 12px; background: #6c63ff; color: #fff; text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
  <div class="wrap">
    <img class="logo" src="/assets/icon-192.png" alt="Trivia Gauntlet" />
    <h1>Trivia Gauntlet</h1>
    <p id="msg">Opening your app store…</p>
    <div class="btns">
      <a class="store" id="ios" href="https://apps.apple.com/app/trivia-gauntlet/id6749189557">Download free on iOS</a>
      <a class="store" id="android" href="https://play.google.com/store/apps/details?id=com.trivia.trivia_gauntlet">Download free on Android</a>
    </div>
  </div>
  <script>
    (function () {
      var APP_STORE  = 'https://apps.apple.com/app/trivia-gauntlet/id6749189557';
      var PLAY_STORE = 'https://play.google.com/store/apps/details?id=com.trivia.trivia_gauntlet';
      var ua = navigator.userAgent || '';
      var isIos     = /iphone|ipad|ipod/i.test(ua);
      var isAndroid = /android/i.test(ua);
      // Auto-redirect phones straight to their store; desktop/other just see both
      // buttons (handles iPads, which report as desktop, gracefully).
      if (isIos)     { window.location.replace(APP_STORE); }
      else if (isAndroid) { window.location.replace(PLAY_STORE); }
      else {
        document.getElementById('msg').textContent = 'Get Trivia Gauntlet free on your phone:';
      }
    })();
  </script>
</body>
</html>
